services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    profiles:
      - app
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      CODEGRAPH_REPO: /repo
      CODEGRAPH_TS_EXTRACTOR: pnpm
      CODEGRAPH_NODE_OPTIONS: --max-old-space-size=6144
      CODEGRAPH_SYMBOL_RELATION_LIMIT: "750"
      CODEGRAPH_DEPCRUISE_FILE_LIMIT: "1500"
    volumes:
      - .:/repo
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
